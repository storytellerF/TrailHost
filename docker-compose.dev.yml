services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: trailhost
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: trailhost
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trailhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_dev_data:
